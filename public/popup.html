<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOSS招呼助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="bh-panel">
    <!-- 头部 -->
    <div class="bh-header">
      <div class="bh-brand">
        <svg viewBox="0 0 24 24" fill="none" class="bh-logo" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <span>BossHelper</span>
        <span class="bh-version">v3.0</span>
      </div>
    </div>

    <!-- 状态 -->
    <div class="bh-status-bar">
      <div id="bh-run-status" class="bh-status ok">
        <span class="bh-status-dot"></span>
        <span class="bh-status-text">系统就绪</span>
      </div>
      <span class="bh-tab-hint" id="bh-tab-hint">未检测到目标页面</span>
    </div>

    <!-- 数据看板 -->
    <div class="bh-dashboard">
      <div class="bh-card">
        <div class="bh-card-title">筛选目标</div>
        <div class="bh-card-value" id="bh-target-count">0</div>
      </div>
      <div class="bh-card highlight">
        <div class="bh-card-title">今日触达</div>
        <div class="bh-card-value" id="bh-greeted-count">0</div>
      </div>
      <div class="bh-card">
        <div class="bh-card-title">本时段</div>
        <div class="bh-card-value" id="bh-hourly-count">0</div>
      </div>
    </div>

    <!-- 院校分布 -->
    <div class="bh-dist-group">
      <div class="bh-dist-item c9"><span class="bh-d-label">C9</span><span class="bh-d-val" id="bh-c9-count">0</span></div>
      <div class="bh-dist-item n985"><span class="bh-d-label">985</span><span class="bh-d-val" id="bh-985-count">0</span></div>
      <div class="bh-dist-item n211"><span class="bh-d-label">211</span><span class="bh-d-val" id="bh-211-count">0</span></div>
    </div>

    <!-- 操作按钮 -->
    <div class="bh-action-group">
      <button class="bh-btn bh-secondary" id="bh-filter-btn">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        重新扫描
      </button>
      <button class="bh-btn bh-primary" id="bh-start-btn">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        启动自动分发
      </button>
      <button class="bh-btn bh-danger" id="bh-stop-btn" style="display:none">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12"/></svg>
        停止运行
      </button>
    </div>

    <div class="bh-separator"></div>

    <!-- 设置 -->
    <details class="bh-details">
      <summary class="bh-accordion">控制面板与规则</summary>
      <div class="bh-collapse-body">
        <div class="bh-control-row">
          <span>操作间隔 (s)</span>
          <input type="number" class="bh-input-box" id="bh-interval" value="10" min="3" max="60">
        </div>
        <div class="bh-control-row">
          <span>单日最大触达</span>
          <input type="number" class="bh-input-box" id="bh-daily-limit" value="80">
        </div>
        <div class="bh-control-row">
          <span>每小时限额</span>
          <input type="number" class="bh-input-box" id="bh-hourly-limit" value="15">
        </div>
        <div class="bh-switch-group">
          <label class="bh-switch-label">
            <input type="checkbox" id="bh-auto-load" checked class="bh-switch-input">
            <span class="bh-switch-ui"></span><span class="bh-switch-text">列表自动翻页提取</span>
          </label>
        </div>
        <div class="bh-switch-group">
          <label class="bh-switch-label">
            <input type="checkbox" id="bh-behavior-sim" checked class="bh-switch-input">
            <span class="bh-switch-ui"></span><span class="bh-switch-text">拟人化风控模拟</span>
          </label>
        </div>

        <div class="bh-filter-rules">
          <div class="bh-rule-title">目标院校规则集</div>
          <div class="bh-tags-selector">
            <label class="bh-check-badge"><input type="checkbox" id="bh-label-c9" checked><span>C9</span></label>
            <label class="bh-check-badge"><input type="checkbox" id="bh-label-985" checked><span>985</span></label>
            <label class="bh-check-badge"><input type="checkbox" id="bh-label-211" checked><span>211</span></label>
          </div>
        </div>
        <button class="bh-btn bh-outline bh-w-full" id="bh-save-settings">保存配置</button>
      </div>
    </details>

    <div class="bh-separator"></div>

    <!-- 话术库 -->
    <details class="bh-details">
      <summary class="bh-accordion">自动交流话术库</summary>
      <div class="bh-collapse-body">
        <div id="bh-greeting-list" class="bh-greeting-list"></div>
        <div style="margin-top:10px;">
          <textarea class="bh-textarea" id="bh-new-greeting" rows="2" placeholder="添加通用沟通模板..."></textarea>
          <button class="bh-btn bh-outline bh-w-full" style="margin-top:8px" id="bh-add-greeting">添加新模板</button>
        </div>
      </div>
    </details>

    <div class="bh-separator"></div>

    <!-- 底部 -->
    <div class="bh-footer-nav">
      <a href="#" class="bh-link" id="bh-records-btn">历史分发记录</a>
      <a href="#" class="bh-link bh-link-danger" id="bh-reset-circuit" style="display:none">强制重置熔断</a>
    </div>

    <!-- 日志终端 -->
    <div class="bh-terminal-title">系统日志终端</div>
    <div class="bh-terminal" id="bh-log"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
